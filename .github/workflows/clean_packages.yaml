name: Clean Packages

on:
  workflow_dispatch:
jobs:
  clean_docker_packages:
    runs-on: ubuntu-latest
    steps:
      - name: Clean Docker Packages
        uses: actions/delete-package-versions@v5
        with:           
          package-name: 'my-app'
          package-type: 'container'
          min-versions-to-keep: '2.0.0'      
