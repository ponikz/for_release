name: Build and Push Docker Image

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write 

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/my-app:1.0.0 .

      - name: Push image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/my-app:1.0.0
